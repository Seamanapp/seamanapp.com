<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Redirecting… — Seaman App</title>
<!-- The web app moved to app.seamanapp.com. Bounce every /app visit there,
     preserving any deep-link suffix + query + hash so links keep working. -->
<meta http-equiv="refresh" content="0; url=https://app.seamanapp.com/" />
<link rel="canonical" href="https://app.seamanapp.com/" />
<script>
  (function () {
    var TARGET = 'https://app.seamanapp.com/';
    var p = location.pathname || '';
    var rest = p.replace(/^\/app\/?/i, '');   // drop "/app" or "/app/"
    if (/^index\.html$/i.test(rest)) rest = ''; // the SPA entry, not a real route
    location.replace(TARGET + rest + location.search + location.hash);
  })();
</script>
</head>
<body style="margin:0;background:#04101f;color:#9fb2c8;font-family:system-ui,sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;">
  <p style="margin:0;padding:20px;">
    The web app moved.
    <a href="https://app.seamanapp.com/" style="color:#4fc3f7;margin-left:6px;">Continue to the app</a>.
  </p>
</body>
</html>
